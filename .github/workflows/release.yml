name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Linux — AppImage
  # ─────────────────────────────────────────────
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libvulkan-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libinput-dev \
            libseat-dev \
            libdbus-1-dev \
            libpipewire-0.3-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config \
            fuse \
            libfuse2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy binary
          cp target/release/steam-workshop-utility AppDir/usr/bin/

          # Desktop entry
          cat > AppDir/usr/share/applications/com.arcadyi.steam_workshop_utility.desktop << 'EOF'
          [Desktop Entry]
          Name=Steam Workshop Utility
          Exec=steam-workshop-utility
          Icon=com.arcadyi.steam_workshop_utility
          Type=Application
          Categories=Utility;Game;
          EOF

          # AppStream metainfo (needed by linuxdeploy)
          cat > AppDir/usr/share/metainfo/com.arcadyi.steam_workshop_utility.metainfo.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <component type="desktop-application">
            <id>com.arcadyi.steam_workshop_utility</id>
            <name>Steam Workshop Utility</name>
            <summary>Manage and force-redownload Steam Workshop items</summary>
            <metadata_license>MIT</metadata_license>
          </component>
          EOF

          # Placeholder icon — replace with your actual icon if you have one as a PNG
          # If you have an SVG icon embedded in the binary you may want to export it here
          if [ -f "data/icons/com.arcadyi.steam_workshop_utility.png" ]; then
            cp data/icons/com.arcadyi.steam_workshop_utility.png \
               AppDir/usr/share/icons/hicolor/256x256/apps/com.arcadyi.steam_workshop_utility.png
          fi

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          # Extract to avoid FUSE issues in CI
          ./linuxdeploy-x86_64.AppImage --appimage-extract
          mv squashfs-root linuxdeploy

      - name: Build AppImage
        env:
          OUTPUT: steam-workshop-utility-x86_64.AppImage
        run: |
          ./linuxdeploy/AppRun \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/com.arcadyi.steam_workshop_utility.desktop \
            --output appimage

          # linuxdeploy names it based on the desktop file Name field
          mv Steam_Workshop_Utility-x86_64.AppImage steam-workshop-utility-x86_64.AppImage || \
          mv *.AppImage steam-workshop-utility-x86_64.AppImage || true

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: steam-workshop-utility-x86_64.AppImage

  # ─────────────────────────────────────────────
  # Windows — .exe
  # ─────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Rename artifact
        run: |
          copy target\x86_64-pc-windows-msvc\release\steam-workshop-utility.exe steam-workshop-utility-windows-x86_64.exe

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: steam-workshop-utility-windows-x86_64.exe

  # ─────────────────────────────────────────────
  # Release — attach both artifacts to the tag
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    # Only publish a release on a tag push, not on manual dispatch
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            steam-workshop-utility-x86_64.AppImage
            steam-workshop-utility-windows-x86_64.exe
          generate_release_notes: true